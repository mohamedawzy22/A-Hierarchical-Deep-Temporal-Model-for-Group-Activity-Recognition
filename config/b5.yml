data:
  feat_dir: volleyball_dataset.h5
  mode: "sequence"

  split:
    train: ["1","3","6","7","10","13","15","16","18","22","23","31",
            "32","36","38","39","40","41","42","48","50","52","53","54"]

    val: ["0","2","8","12","17","19","24","26","27","28","30","33","46","49","51"]

    test: ["4","5","9","11","14","20","21","25","29","34","35","37","43","44","45","47"]


classes:
  labels_Group: ['l-pass', 'r-pass', 'l-spike', 'r_spike', 'l_set', 'r_set', 'l_winpoint', 'r_winpoint']
  num_classes: 8

  
hyperparameters:
  learning_rate: 0.0004
  batch_size: 32
  num_epochs: 30
  scheduler_step_size: 4
  scheduler_gamma: 0.4
  input_size: 2048
  hidden_size: 1024
  num_layers: 1
  seed: 43


save_dir: 
  base: "checkpoints"
  experiment_name: "Baseline_5"
  
  